name: gha-sandbox

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Compile executable
        shell: bash
        run: clang test.c -o test

      - name: Upload executable
        uses: actions/upload-artifact@v6
        with:
          name: test
          path: "test"
          if-no-files-found: error
          retention-days: 1
